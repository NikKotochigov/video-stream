<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Ustanovka WebRTC-soedineniya">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EEF5"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F766E"/>
    </marker>
    <marker id="arrowCoral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C2410C"/>
    </marker>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 42px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #64748B; }
      .peer-title { font: 700 22px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .peer-sub { font: 500 15px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .step-num { font: 700 18px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #FFFFFF; }
      .step-title { font: 700 20px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .step-note { font: 500 15px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .lane { font: 600 14px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #64748B; letter-spacing: 0.04em; }
      .legend { font: 600 16px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .code { font: 600 16px Menlo, Consolas, monospace; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <text x="800" y="64" text-anchor="middle" class="title">Установка WebRTC-соединения</text>
  <text x="800" y="98" text-anchor="middle" class="subtitle">от peer connection до ontrack</text>

  <!-- PC A -->
  <rect x="48" y="140" width="280" height="680" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
  <rect x="48" y="140" width="280" height="64" rx="16" fill="#CCFBF1"/>
  <rect x="48" y="180" width="280" height="24" fill="#CCFBF1"/>
  <text x="188" y="180" text-anchor="middle" class="peer-title">PC A</text>
  <text x="188" y="208" text-anchor="middle" class="peer-sub">sender</text>

  <rect x="78" y="250" width="220" height="100" rx="12" fill="#F0FDFA" stroke="#99F6E4"/>
  <text x="188" y="295" text-anchor="middle" class="code">RTCPeerConnection</text>
  <text x="188" y="322" text-anchor="middle" class="peer-sub">отправитель</text>

  <rect x="78" y="380" width="220" height="120" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="188" y="430" text-anchor="middle" class="peer-sub">MediaStreamTrack</text>
  <text x="188" y="458" text-anchor="middle" class="code">addTrack(...)</text>

  <rect x="78" y="540" width="220" height="100" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="188" y="585" text-anchor="middle" class="peer-sub">createOffer</text>
  <text x="188" y="612" text-anchor="middle" class="code">setLocalDescription</text>

  <rect x="78" y="680" width="220" height="90" rx="12" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="188" y="725" text-anchor="middle" class="peer-sub">encode -&gt; RTP</text>
  <text x="188" y="752" text-anchor="middle" class="code">медиа наружу</text>

  <!-- PC B -->
  <rect x="1272" y="140" width="280" height="680" rx="16" fill="#FFFFFF" stroke="#C2410C" stroke-width="3"/>
  <rect x="1272" y="140" width="280" height="64" rx="16" fill="#FFEDD5"/>
  <rect x="1272" y="180" width="280" height="24" fill="#FFEDD5"/>
  <text x="1412" y="180" text-anchor="middle" class="peer-title">PC B</text>
  <text x="1412" y="208" text-anchor="middle" class="peer-sub">receiver</text>

  <rect x="1302" y="250" width="220" height="100" rx="12" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="1412" y="295" text-anchor="middle" class="code">RTCPeerConnection</text>
  <text x="1412" y="322" text-anchor="middle" class="peer-sub">получатель</text>

  <rect x="1302" y="380" width="220" height="120" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1412" y="430" text-anchor="middle" class="peer-sub">setRemote(offer)</text>
  <text x="1412" y="458" text-anchor="middle" class="code">createAnswer</text>

  <rect x="1302" y="540" width="220" height="100" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1412" y="585" text-anchor="middle" class="peer-sub">setLocal(answer)</text>
  <text x="1412" y="612" text-anchor="middle" class="code">ICE candidates</text>

  <rect x="1302" y="680" width="220" height="90" rx="12" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1412" y="725" text-anchor="middle" class="peer-sub">ontrack -&gt; video</text>
  <text x="1412" y="752" text-anchor="middle" class="code">decode</text>

  <!-- Center -->
  <rect x="380" y="140" width="840" height="680" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="800" y="178" text-anchor="middle" class="lane">SIGNALING  ·  SDP + ICE</text>

  <circle cx="430" cy="230" r="22" fill="#0F766E"/>
  <text x="430" y="236" text-anchor="middle" class="step-num">1</text>
  <text x="470" y="228" class="step-title">new RTCPeerConnection</text>
  <text x="470" y="252" class="step-note">создаём peer connection на обеих сторонах</text>

  <circle cx="430" cy="320" r="22" fill="#0F766E"/>
  <text x="430" y="326" text-anchor="middle" class="step-num">2</text>
  <text x="470" y="318" class="step-title">addTrack на PC A</text>
  <text x="470" y="342" class="step-note">кладём video/audio track в соединение</text>

  <circle cx="430" cy="410" r="22" fill="#0369A1"/>
  <text x="430" y="416" text-anchor="middle" class="step-num">3</text>
  <text x="470" y="400" class="step-title">Offer (SDP)  A -&gt; B</text>
  <text x="470" y="424" class="step-note">createOffer + setLocal -&gt; setRemote на B</text>
  <line x1="520" y1="448" x2="1080" y2="448" stroke="#0F766E" stroke-width="3" marker-end="url(#arrowTeal)"/>

  <circle cx="430" cy="510" r="22" fill="#C2410C"/>
  <text x="430" y="516" text-anchor="middle" class="step-num">4</text>
  <text x="470" y="500" class="step-title">Answer (SDP)  B -&gt; A</text>
  <text x="470" y="524" class="step-note">createAnswer + setLocal -&gt; setRemote на A</text>
  <line x1="1080" y1="548" x2="520" y2="548" stroke="#C2410C" stroke-width="3" marker-end="url(#arrowCoral)"/>

  <circle cx="430" cy="610" r="22" fill="#475569"/>
  <text x="430" y="616" text-anchor="middle" class="step-num">5</text>
  <text x="470" y="600" class="step-title">ICE candidates  A &lt;-&gt; B</text>
  <text x="470" y="624" class="step-note">ищем сетевой путь (STUN / TURN)</text>
  <line x1="520" y1="648" x2="1080" y2="648" stroke="#334155" stroke-width="2.5" stroke-dasharray="7 5" marker-start="url(#arrowSlate)" marker-end="url(#arrowSlate)"/>

  <circle cx="430" cy="720" r="22" fill="#EA580C"/>
  <text x="430" y="726" text-anchor="middle" class="step-num">6</text>
  <text x="470" y="710" class="step-title">Медиа (RTP)  A -&gt; B</text>
  <text x="470" y="734" class="step-note">encode -&gt; сеть -&gt; decode -&gt; ontrack</text>
  <line x1="520" y1="758" x2="1080" y2="758" stroke="#EA580C" stroke-width="5" marker-end="url(#arrowCoral)"/>

  <rect x="200" y="870" width="340" height="64" rx="12" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="370" y="910" text-anchor="middle" class="legend">SDP — договор о кодеках</text>

  <rect x="580" y="870" width="340" height="64" rx="12" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="750" y="910" text-anchor="middle" class="legend">ICE — путь по сети</text>

  <rect x="960" y="870" width="440" height="64" rx="12" fill="#FFFFFF" stroke="#94A3B8"/>
  <text x="1180" y="910" text-anchor="middle" class="legend">ontrack — трек у получателя</text>
</svg>
